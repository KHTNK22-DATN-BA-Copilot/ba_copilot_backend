name: BE CI/CD

on:
  push:
    branches: 
      - main

env:
  IMAGE_NAME: ghcr.io/khtnk22-datn-ba-copilot/ba_copilot_backend/backend:latest

jobs:
  # ========== CI: Build & Lint ==========
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # 🔥 bắt buộc để push GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ===== Docker =====
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ secrets.ACTOR }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

  # ========== CD: Deploy ==========
  deploy:
    runs-on: ["self-hosted", "Linux", "X64"]
    needs: build

    steps:
      - name: Login to GHCR (server)
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.ACTOR }} --password-stdin

      - name: Pull latest backend image
        run: docker pull $IMAGE_NAME

      - name: Restart backend container
        run: |
          docker compose pull backend
          docker compose up -d --force-recreate backend
        working-directory: /home/bacopilotteam/bacopilot

      - name: Cleanup old images
        run: docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for backend..."
          sleep 10
          docker ps | grep ba-copilot-backend || echo "Warning: Backend may not be running"
